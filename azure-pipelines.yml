trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:
- script: | 
    echo "Running post-deployment tests..."
    mkdir -p test-results
    echo "Test results" > test-results/results.txt
    git --version 
    echo "checked git version"
    docker --version
    echo "checked docker version"
    terraform --version
    sudo apt-get install -y terraform
    echo "checked terraform version"
  displayName: 'Tools Check' 